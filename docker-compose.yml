services:
   heimdall: # Dashboard for all you Apps
    image: linuxserver/heimdall
    container_name: heimdall
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${PATH_TO_DISK}/appdata/heimdall:/config
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped

   portainer: # UI based management of Docker
    image: portainer/portainer-ce
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    restart: unless-stopped
    ports:
      - 9000:9000
      - 8000:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

   pihole: # Pi-hole
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: 'America/Phoenix'
      DNSMASQ_LISTENING: 'all' # set this to all if pihole will only be accessible within your local network (non internet facing). https://github.com/pi-hole/docker-pi-hole?tab=readme-ov-file#optional-variables
      QUERY_LOGGING: 'false' # Disable Query logging. https://github.com/pi-hole/docker-pi-hole?tab=readme-ov-file#optional-variables
      WEBPASSWORD: ${PIHOLE_PASSWORD}
    # Volumes store your data between container upgrades
    volumes:
      - ${PATH_TO_DISK}/appdata/pihole/config:/etc/pihole
      - ${PATH_TO_DISK}/appdata/pihole/dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

   cloudflared: # CloudflareD Tunnel
    container_name: cloudflared
    image: cloudflare/cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=
    restart: unless-stopped

   jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl={LOCAL_TAIL_HOST} # Optional: Change to your Pi's IP
    volumes:
      - ${PATH_TO_DATA}/appdata/jellyfin:/config
      - ${PATH_TO_DATA}/media/tv:/data/tvshows
      - ${PATH_TO_DATA}/media/movies:/data/movies
    ports:
      - 8096:8096
      - 8920:8920 # Optional: HTTPS port
    devices:
      - /dev/dri:/dev/dri # Essential for Hardware Acceleration on Pi 5
    restart: unless-stopped

   navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    environment:
      - TZ=${TZ}
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
    volumes:
      - ${PATH_TO_DISK}/appdata/navidrome:/data
      - ${PATH_TO_DISK}/media/music:/music:ro  # adjust path to where your music lives
    ports:
      - 4533:4533
    restart: unless-stopped

  # cloudcmd: # UI based filemanager
  #   image: coderaiser/cloudcmd:latest-alpine
  #   container_name: cloudcmd
  #   ports:
  #     - 8008:8000
  #   volumes:
  #     - ~:/root
  #     - /:/mnt/fs

   pyload: # pyload - download manager for your NAS
    image: linuxserver/pyload
    container_name: pyload
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${PATH_TO_DISK}/appdata/pyload:/config
      - ${PATH_TO_DISK}/downloads:/downloads
    ports:
      - 8088:8000
      - 7227:7227 #optional
    restart: unless-stopped

   nextcloud_postgres: # DB for Nextcloud
     image: postgres
     container_name: nextcloud_postgres
     restart: always
     volumes:
       - nextcloud_postgres:/var/lib/postgresql
     environment:
       - POSTGRES_PASSWORD=nextcloud
       - POSTGRES_DATABASE=nextcloud
       - POSTGRES_USER=nextcloud
     networks:
       - nextcloud_network

   nextcloud: # Nextcloud
     image: nextcloud
     container_name: nextcloud
     ports:
       - 8081:80
     volumes:
       - ${PATH_TO_DATA}/nextcloud:/var/www/html
     restart: unless-stopped
     depends_on:
       - nextcloud_postgres
     networks:
       - nextcloud_network

   immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${PATH_TO_DATA}/immich/library:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich_postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich_redis
    ports:
      - 2283:2283
    depends_on:
      - immich_redis
      - immich_postgres
    restart: unless-stopped

   immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - immich_model_cache:/cache
    restart: unless-stopped

   immich_redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    restart: unless-stopped

   immich_postgres:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
    volumes:
      - ${PATH_TO_DATA}${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

   homebridge: # Homebridge
    image: homebridge/homebridge:latest
    network_mode: host
    volumes:
      - ${PATH_TO_DISK}/appdata/homebridge:/homebridge
    logging:
      driver: json-file
      options:
        max-size: "10mb"
        max-file: "1"
    restart: unless-stopped

   deconz: # deCONZ
    image: deconzcommunity/deconz
    container_name: deconz
    ports:
      - 8888:80
      - 8443:443
    volumes:
      - ${PATH_TO_DISK}/appdata/deconz:/opt/deCONZ
    devices:
      - /dev/ttyUSB0 # USB device for Conbee II
    environment:
      - DECONZ_WEB_PORT=8888
      - DECONZ_WS_PORT=8443
      - DEBUG_INFO=1
      - DEBUG_APS=0
      - DEBUG_ZCL=0
      - DEBUG_ZDP=0
      - DEBUG_OTA=0
    restart: unless-stopped

  # homeassistant: # homeassistant
  #   image: homeassistant/raspberrypi4-homeassistant:stable
  #   container_name: home-assistant
  #   environment:
  #     - TZ=Europe/Berlin
  #   volumes:
  #     - ${PATH_TO_DISK}/appdata/homeassistant:/config
  #   ports:
  #     - 8123:8123
  #   restart: unless-stopped

  ## Monitoring Stack:
   telegraf:
    image: telegraf:latest
    container_name: telegraf
    command: --config-directory /etc/telegraf/telegraf.d
    depends_on:
      - influxdb
    networks:
      - influxdb
    volumes:
      - ${PATH_TO_DISK}/appdata/monitoring/telegraf:/etc/telegraf
      - /sys/class/thermal/thermal_zone0/temp:/sys/class/thermal/thermal_zone0/temp:ro
    restart: always

   influxdb:
    image: influxdb:latest
    container_name: influxdb
    networks:
      - influxdb
    volumes:
      - influxdb-storage:/var/lib/influxdb
    restart: unless-stopped

   grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - influxdb
    ports:
      - 3000:3000
    networks:
      - influxdb
    environment:
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-storage:/var/lib/grafana
      - ${PATH_TO_DISK}/appdata/monitoring/grafana:/etc/grafana/provisioning
    restart: unless-stopped

   speedtest:
     image: kjake/internet-speedtest-docker:speedtest
     container_name: speedtest
     depends_on:
       - influxdb
     networks:
       - influxdb
     environment:
       - TEST_INTERVAL=3600
     restart: unless-stopped

volumes:
  portainer_data:
  nextcloud_postgres:
  nextcloud:
  grafana-storage:
  influxdb-storage:
  immich_model_cache:

networks:
  influxdb:
  nextcloud_network:
    driver: bridge
